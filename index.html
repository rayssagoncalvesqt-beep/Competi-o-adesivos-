<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competicao de Adesivagem</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070c14;color:#e8eaf0;font-family:'Barlow',sans-serif;min-height:100vh}
:root{--bg:#070c14;--surface:#0d1520;--card:#111c2e;--border:#1a2d45;--accent:#3b9eff;--accent2:#1a5fb4;--muted:#7a8099;--text:#e8eaf0;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32}
.wrap{max-width:1380px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#070c14,#0a1628 50%,#070c14);border-bottom:2px solid var(--accent);padding:20px 24px 14px;position:relative;overflow:hidden}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-left{display:flex;align-items:center;gap:12px}
h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;color:var(--accent);line-height:1}
h1 span{display:block;font-size:.75rem;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--muted);letter-spacing:5px;text-transform:uppercase;margin-top:3px}
.mbadge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;padding:3px 11px;border-radius:20px}
.mbadge.ed{background:rgba(59,158,255,.15);border:1px solid var(--accent);color:var(--accent)}
.mbadge.vw{background:rgba(96,180,255,.1);border:1px solid #60b4ff;color:#60b4ff}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 14px;text-align:center}
.badge .n{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--accent);line-height:1}
.badge .l{font-size:.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.wkbar{padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.wklbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.wkinput{background:var(--card);border:1.5px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:.92rem;padding:5px 12px;border-radius:8px;outline:none;width:200px}
.wkval{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;color:var(--text);background:var(--card);border:1px solid var(--border);padding:5px 14px;border-radius:8px}
.tabs-wrap{padding:0 24px;overflow-x:auto}
.tabs{display:flex;gap:4px;min-width:max-content;border-bottom:2px solid var(--border)}
.tab{background:none;border:1.5px solid transparent;border-bottom:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:7px 13px;border-radius:8px 8px 0 0;position:relative;top:2px;white-space:nowrap}
.tab.active{color:var(--accent);background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface)}
.tbadge{display:inline-block;background:var(--accent2);color:#fff;font-size:.64rem;padding:1px 5px;border-radius:20px;margin-left:4px;font-weight:700}
.tab.active .tbadge{background:var(--accent);color:var(--bg)}
.panels{padding:0 24px 60px}
.ph{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:10px}
.pname{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:3px;color:var(--text)}
.pname span{color:var(--accent)}
.stats{display:flex;gap:9px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 14px;text-align:center;min-width:80px}
.stat .v{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;line-height:1}
.stat.p .v{color:var(--accent)}
.stat.s .v{color:var(--muted)}
.stat .l{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.prg{margin-bottom:22px}
.prg-lbl{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.prg-track{background:var(--card);border-radius:100px;height:9px;border:1px solid var(--border);overflow:hidden}
.prg-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.addwk{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:22px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.addwk .lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.wni{background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:.9rem;padding:6px 10px;border-radius:7px;width:136px;outline:none}
.cni{background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:1.15rem;padding:6px 10px;border-radius:7px;width:80px;outline:none;text-align:center}
.btn-add{background:var(--accent);color:var(--bg);border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:2px;padding:8px 16px;border-radius:7px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.wkgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.wkcard{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 12px;display:flex;align-items:center;gap:8px}
.wkcard .wl{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.wkcard .wc{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--accent);line-height:1}
.wk-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:2px 4px}
.empty{color:var(--muted);font-size:.78rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px;text-transform:uppercase}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:13px}
.pitem{position:relative;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;aspect-ratio:4/3;cursor:pointer}
.pitem img{width:100%;height:100%;object-fit:cover;display:block}
.pdel{position:absolute;top:5px;right:5px;background:rgba(7,12,20,.85);color:#e8392a;border:none;border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.ptag{position:absolute;bottom:4px;left:4px;background:rgba(59,158,255,.9);color:var(--bg);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.63rem;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.upzone{border:2px dashed var(--border);border-radius:10px;padding:22px;text-align:center;cursor:pointer;background:var(--card);margin-top:8px}
.upzone .ui{font-size:1.6rem;margin-bottom:4px}
.upzone p{font-family:'Barlow Condensed',sans-serif;font-size:.76rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.uploading{background:rgba(59,158,255,.1);border:1px solid var(--accent);border-radius:8px;padding:10px 16px;margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px;color:var(--accent);text-align:center}
.rtoggle{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.rtbtn{background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;padding:6px 15px;border-radius:7px;cursor:pointer}
.rtbtn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.date-range{background:var(--card);border:1.5px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;padding:6px 12px;border-radius:7px;outline:none;width:160px}
.rbox{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.rbhdr{background:linear-gradient(90deg,rgba(59,158,255,.12),rgba(26,95,180,.08));padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.rbhdr h2{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:3px;color:var(--accent)}
.wkbadge{background:var(--accent);color:var(--bg);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:2px;padding:3px 10px;border-radius:20px}
.rrow{display:flex;align-items:center;gap:11px;padding:10px 18px;border-bottom:1px solid var(--border);cursor:pointer}
.rrow:last-child{border-bottom:none}
.rpos{font-size:1.8rem;width:36px;text-align:center;flex-shrink:0}
.rname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.92rem;flex:1}
.rbarw{flex:2;display:flex;align-items:center;gap:6px}
.rbar{flex:1;height:6px;background:var(--surface);border-radius:100px;overflow:hidden}
.rbarf{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.rcars{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;color:var(--accent);min-width:40px;text-align:right}
.rpct{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);min-width:36px;text-align:right}
.sbtns{display:flex;gap:7px;flex-wrap:wrap}
.sbtn{border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.82rem;letter-spacing:2px;padding:8px 16px;border-radius:8px;color:var(--bg)}
.sbtn.s1{background:linear-gradient(135deg,#1a5fb4,#3b9eff)}
.sbtn.s2{background:linear-gradient(135deg,#0d3a6e,#1a5fb4)}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 18px;margin-top:4px}
.prog-card .note{margin-top:8px;font-size:.7rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1.5px}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:90vh;border-radius:10px}
.lbclose{position:absolute;top:16px;right:22px;background:none;border:none;color:#fff;font-size:1.9rem;cursor:pointer}
.pwscreen{display:flex;align-items:center;justify-content:center;min-height:80vh}
.pwbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 32px;text-align:center;max-width:340px;width:100%}
.pwbox h2{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;color:var(--accent);margin-bottom:4px}
.pwbox p{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:20px}
.pwinp{background:var(--surface);border:1.5px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:1rem;padding:9px 12px;border-radius:7px;width:100%;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px}
.pwbtn{background:linear-gradient(135deg,#1a5fb4,#3b9eff);color:var(--bg);border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;padding:9px 0;border-radius:7px;width:100%}
.pwerr{color:#e8392a;font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.toast{position:fixed;bottom:16px;right:16px;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:20px;opacity:0;transition:opacity .4s;pointer-events:none;z-index:999}
.toast.ok{background:rgba(59,158,255,.2);border:1px solid var(--accent);color:var(--accent)}
.toast.err{background:rgba(232,57,42,.2);border:1px solid #e8392a;color:#e8392a}
.toast.show{opacity:1}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;padding:5px 11px;border-radius:7px}
.refbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:2px;text-transform:uppercase;padding:5px 11px;border-radius:7px;cursor:pointer}
.sel-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;background:var(--bg)}
.sel-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.sel-btn{border:none;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;padding:14px 30px;border-radius:10px}
.sel-btn.vw{background:linear-gradient(135deg,#0d3a6e,#1a5fb4);color:#e8eaf0}
.sel-btn.ed{background:linear-gradient(135deg,#1a5fb4,#3b9eff);color:#070c14}
@media(max-width:720px){.hdr,.wkbar,.tabs-wrap,.panels{padding-left:14px;padding-right:14px}h1{font-size:1.6rem}.pgrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var FB={apiKey:"AIzaSyBuZst0oOe6O0nHbMpqoi3jHn2g30TwkOk",authDomain:"competicao-roriz.firebaseapp.com",databaseURL:"https://competicao-roriz-default-rtdb.firebaseio.com",projectId:"competicao-roriz",storageBucket:"competicao-roriz.firebasestorage.app",messagingSenderId:"54357624066",appId:"1:54357624066:web:66a8b5fa08b8505abaae1b"};
firebase.initializeApp(FB);
var db=firebase.database();
var CLOUD_NAME="dtcutnwvc";
var UPLOAD_PRESET="competicao_roriz";
var TEAMS=[{id:0,name:"Alberto e Gilson"},{id:1,name:"Gemildo"},{id:2,name:"Jesion"},{id:3,name:"Nogueira e Feitosa"},{id:4,name:"Miranda"},{id:5,name:"Wberthyer"},{id:6,name:"Paulo"},{id:7,name:"Ze Roberto"},{id:8,name:"Henrique"}];
var SENHA="roriz2025";
var MEDALS=["&#127945;","&#129352;","&#129353;"];
var S={mode:"select",tab:"ranking",rv:"total",sem:"",periodo:"",teams:{},pwErr:false,lb:null,tShow:false,tMsg:"",tType:"ok",wi:{},loaded:false,uploading:false,uploadingTeam:-1};
TEAMS.forEach(function(t){S.teams[t.id]={weeks:[],photos:[]};S.wi[t.id]={name:"",cars:""};});

function dataHoje(){var d=new Date();return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}

function uploadToCloudinary(file,callback){
var fd=new FormData();
fd.append("file",file);
fd.append("upload_preset",UPLOAD_PRESET);
fd.append("folder","competicao_roriz");
var xhr=new XMLHttpRequest();
xhr.open("POST","https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/image/upload");
xhr.onload=function(){try{var r=JSON.parse(xhr.responseText);if(r.secure_url)callback(null,r.secure_url);else callback("erro");}catch(e){callback("erro");}};
xhr.onerror=function(){callback("erro rede");};
xhr.send(fd);}

var st=null;
function salvar(){clearTimeout(st);st=setTimeout(function(){var d={sem:S.sem,periodo:S.periodo,teams:{}};TEAMS.forEach(function(t){d.teams[t.id]={weeks:S.teams[t.id].weeks||[],photos:S.teams[t.id].photos||[]};});db.ref("comp6").set(d).then(function(){toast("Salvo!","ok");}).catch(function(){toast("Erro ao salvar","err");});},800);}

function carregar(){db.ref("comp6").once("value").then(function(snap){var d=snap.val();if(d){S.sem=d.sem||"";S.periodo=d.periodo||"";TEAMS.forEach(function(t){if(d.teams&&d.teams[t.id]){S.teams[t.id]={weeks:d.teams[t.id].weeks||[],photos:d.teams[t.id].photos||[]};}});}S.loaded=true;render();}).catch(function(){S.loaded=true;render();});}

function soma(t){return(t&&t.weeks?t.weeks:[]).reduce(function(s,w){return s+(w.cars||0);},0);}
function totalGeral(){return TEAMS.reduce(function(s,t){return s+soma(S.teams[t.id]);},0);}
function maxTotal(){var m=0;TEAMS.forEach(function(t){var v=soma(S.teams[t.id]);if(v>m)m=v;});return m||100;}
function semCars(tid){var wks=S.teams[tid].weeks||[];var m=wks.filter(function(w){return w.name.trim()===S.sem.trim();});if(m.length)return m.reduce(function(s,w){return s+w.cars;},0);if(wks.length)return wks[wks.length-1].cars;return 0;}
function rank(modo){return TEAMS.map(function(t){return{id:t.id,name:t.name,total:modo==="week"?semCars(t.id):soma(S.teams[t.id])};}).sort(function(a,b){return b.total-a.total;});}

var tt=null;
function toast(msg,type){S.tShow=true;S.tMsg=msg;S.tType=type||"ok";render();clearTimeout(tt);tt=setTimeout(function(){S.tShow=false;render();},2500);}
function render(){var a=document.getElementById("app");if(a)a.innerHTML=tela();}

function tela(){if(S.mode==="select")return selTela();if(S.mode==="login")return loginTela();if(!S.loaded)return'<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;font-size:2rem;color:#3b9eff">Carregando...</div>';return mainTela();}

function selTela(){return'<div class="sel-screen"><div style="font-size:3.5rem">&#127942;</div><div style="font-family:Bebas Neue,sans-serif;font-size:2.2rem;letter-spacing:3px;color:#3b9eff;text-align:center">Competicao de Adesivagem<div style="font-size:.8rem;color:#7a8099;letter-spacing:5px;margin-top:8px">JOAQUIM RORIZ NETO</div></div><div class="sel-btns"><button class="sel-btn vw" onclick="irV()">&#128065; Visualizar Resultados</button><button class="sel-btn ed" onclick="irL()">&#9997; Editar Admin</button></div></div>';}

function loginTela(){return'<div style="min-height:100vh;background:#070c14"><div class="pwscreen"><div class="pwbox"><div style="font-size:2rem;margin-bottom:10px">&#128274;</div><h2>Acesso Editor</h2><p>Digite a senha</p><input class="pwinp" type="password" id="pw" placeholder="senha" onkeydown="if(event.key===\'Enter\')login()">'+(S.pwErr?'<div class="pwerr">Senha incorreta</div>':'')+'<button class="pwbtn" onclick="login()">Entrar</button><div style="margin-top:14px"><button class="back-btn" onclick="irS()">Voltar</button></div></div></div></div>';}

function mainTela(){
var isEd=S.mode==="editor";
var gt=totalGeral();
var mx=maxTotal();
var pct=Math.min(100,Math.round(gt/(mx*TEAMS.length)*100));
var painel="";
if(S.tab==="ranking"){painel=rankPainel(gt,pct,mx);}
else{for(var i=0;i<TEAMS.length;i++){if(TEAMS[i].id===S.tab){painel=isEd?edPainel(TEAMS[i]):vwPainel(TEAMS[i]);break;}}}
var tabs='<button class="tab '+(S.tab==="ranking"?"active":"")+'" onclick="setTab(\'ranking\')">&#127942; Ranking</button>';
for(var j=0;j<TEAMS.length;j++){var t=TEAMS[j];tabs+='<button class="tab '+(S.tab===t.id?"active":"")+'" onclick="setTab('+t.id+')">'+t.name+'<span class="tbadge">'+soma(S.teams[t.id])+'</span></button>';}
var dr=(isEd?'':'<button class="refbtn" onclick="carregar()">&#8635; Atualizar</button>')+'<div class="badges"><div class="badge"><div class="n">'+gt+'</div><div class="l">Total Adesivados</div></div><div class="badge"><div class="n">'+TEAMS.length+'</div><div class="l">Equipes</div></div></div><button class="back-btn" onclick="irS()">Sair</button>';
var semH=isEd?'<input class="wkinput" id="sem" value="'+S.sem+'" placeholder="Ex: Semana 1" oninput="S.sem=this.value;salvar()">':'<span class="wkval">'+(S.sem||"---")+'</span>';
return'<div style="min-height:100vh;background:#070c14"><header class="hdr"><div class="wrap hdr-inner"><div class="hdr-left"><div style="font-size:2.4rem">&#127942;</div><div><h1>Competicao<span>Adesivagem de Carros</span></h1></div><span class="mbadge '+(isEd?"ed":"vw")+'">'+(isEd?"&#9997; Editor":"&#128065; Visualizacao")+'</span></div><div class="hdr-right">'+dr+'</div></div></header><div class="wrap wkbar"><span class="wklbl">&#128197; Semana:</span>'+semH+'</div><div class="wrap tabs-wrap"><div class="tabs">'+tabs+'</div></div><div class="wrap panels">'+painel+'</div>'+lbHTML()+'<div class="toast '+S.tType+(S.tShow?" show":"")+'">'+S.tMsg+'</div></div>';}

function rankPainel(gt,pct,mx){
var s=rank(S.rv);var max=s.length>0?s[0].total:1;var linhas="";
for(var i=0;i<s.length;i++){
var t=s[i];var pos=i+1;
var medal=pos<=3?MEDALS[i]:pos+"o";
var bw=max>0?Math.round(t.total/max*100):0;
linhas+='<div class="rrow" onclick="setTab('+t.id+')"><div class="rpos">'+medal+'</div><div class="rname">'+t.name+'</div><div class="rbarw"><div class="rbar"><div class="rbarf" style="width:'+bw+'%"></div></div></div><div class="rcars">'+t.total+'</div><div class="rpct">'+t.total+' carros</div></div>';}
var periodoInput=S.mode==="editor"?'<input class="date-range" id="periodo" value="'+S.periodo+'" placeholder="Ex: 27/04 a 02/05" oninput="S.periodo=this.value;salvar()">':'';
var periodoLabel=S.periodo?'<span class="wkbadge" style="background:#1a5fb4">'+S.periodo+'</span>':'';
var lider=s.length>0?s[0]:null;
var liderHTML=lider&&lider.total>0?'<div style="font-family:Barlow Condensed,sans-serif;font-size:.8rem;color:var(--muted);margin-top:8px">Lider: <span style="color:var(--gold)">'+lider.name+'</span> com <span style="color:var(--accent)">'+lider.total+' carros</span></div>':'';
return'<div><div class="ph"><div class="pname">&#127942; Ranking Geral</div><div class="sbtns"><button class="sbtn s1" onclick="copiar(\'week\')">&#128203; Copiar Semana</button><button class="sbtn s2" onclick="copiar(\'total\')">&#127942; Copiar Total</button></div></div><div class="rtoggle"><button class="rtbtn '+(S.rv==="total"?"active":"")+'" onclick="S.rv=\'total\';render()">&#128202; Total</button><button class="rtbtn '+(S.rv==="week"?"active":"")+'" onclick="S.rv=\'week\';render()">&#128197; Semana</button>'+periodoInput+'</div><div class="rbox"><div class="rbhdr"><h2>'+(S.rv==="week"?"Ranking da Semana":"Classificacao Total")+'</h2><div style="display:flex;gap:6px;align-items:center"><span class="wkbadge">'+(S.sem||"---")+'</span>'+periodoLabel+'</div></div>'+linhas+'</div><div class="prog-card"><div class="prg-lbl"><span>Total Geral</span><span>'+gt+' carros</span></div><div class="prg-track"><div class="prg-fill" style="width:100%"></div></div>'+liderHTML+'</div></div>';}

function edPainel(t){
var d=S.teams[t.id];var tot=soma(d);
var mx=maxTotal();var pct=mx>0?Math.min(100,Math.round(tot/mx*100)):0;
var wi=S.wi[t.id];
var sems=d.weeks.length===0?'<span class="empty">Sem registros</span>':"";
for(var i=0;i<d.weeks.length;i++){var w=d.weeks[i];sems+='<div class="wkcard"><div><div class="wl">'+w.name+'</div><div class="wc">'+w.cars+' carros</div></div><button class="wk-del" onclick="delSem('+t.id+','+i+')">X</button></div>';}
var fotos="";
for(var j=0;j<d.photos.length;j++){var p=d.photos[j];fotos+='<div class="pitem" onclick="abrirFoto(\''+p.url+'\')"><img src="'+p.url+'" alt="" loading="lazy"><button class="pdel" onclick="event.stopPropagation();delFoto('+t.id+','+j+')">X</button>'+(p.data?'<div class="ptag">'+p.data+'</div>':'')+'</div>';}
var uploadingHTML=S.uploading&&S.uploadingTeam===t.id?'<div class="uploading">&#128247; Enviando fotos... aguarde</div>':'';
return'<div><div class="ph"><div class="pname"><span>'+t.name+'</span></div><div class="stats"><div class="stat p"><div class="v">'+tot+'</div><div class="l">Adesivados</div></div><div class="stat s"><div class="v">'+d.photos.length+'</div><div class="l">&#128247; Fotos</div></div></div></div><div class="prg"><div class="prg-lbl"><span>Progresso</span><span>'+tot+' carros</span></div><div class="prg-track"><div class="prg-fill" style="width:'+pct+'%"></div></div></div><div class="addwk"><span class="lbl">+ Registrar</span><input class="wni" id="wn'+t.id+'" value="'+wi.name+'" placeholder="Semana 1" onkeydown="if(event.key===\'Enter\')addSem('+t.id+')"><input class="cni" id="wc'+t.id+'" type="number" value="'+wi.cars+'" placeholder="00" min="0" onkeydown="if(event.key===\'Enter\')addSem('+t.id+')"><button class="btn-add" onclick="addSem('+t.id+')">Adicionar</button></div><div class="sec-title">&#128197; Historico</div><div class="wkgrid">'+sems+'</div><div class="sec-title" style="margin-bottom:12px">&#128247; Fotos ('+d.photos.length+')</div><div class="pgrid">'+fotos+'</div><div class="upzone" onclick="document.getElementById(\'up'+t.id+'\').click()"><div class="ui">&#128247;</div><p>Clique para adicionar fotos (sem limite)</p><input id="up'+t.id+'" type="file" accept="image/*" multiple style="display:none" onchange="upload(event,'+t.id+')"></div>'+uploadingHTML+'</div>';}

function vwPainel(t){
var d=S.teams[t.id];var tot=soma(d);
var mx=maxTotal();var pct=mx>0?Math.min(100,Math.round(tot/mx*100)):0;
var sems=d.weeks.length===0?'<span class="empty">Sem registros</span>':"";
for(var i=0;i<d.weeks.length;i++){sems+='<div class="wkcard"><div class="wl">'+d.weeks[i].name+'</div><div class="wc">'+d.weeks[i].cars+' carros</div></div>';}
var fotos=d.photos.length===0?'<span class="empty">Sem fotos</span>':'<div class="pgrid">';
for(var j=0;j<d.photos.length;j++){var p=d.photos[j];fotos+='<div class="pitem" onclick="abrirFoto(\''+p.url+'\')"><img src="'+p.url+'" alt="" loading="lazy">'+(p.data?'<div class="ptag">'+p.data+'</div>':'')+'</div>';}
if(d.photos.length>0)fotos+='</div>';
return'<div><div class="ph"><div class="pname"><span>'+t.name+'</span></div><div class="stats"><div class="stat p"><div class="v">'+tot+'</div><div class="l">Adesivados</div></div><div class="stat s"><div class="v">'+d.photos.length+'</div><div class="l">&#128247; Fotos</div></div></div></div><div class="prg"><div class="prg-lbl"><span>Progresso</span><span>'+tot+' carros</span></div><div class="prg-track"><div class="prg-fill" style="width:'+pct+'%"></div></div></div><div class="sec-title">&#128197; Historico</div><div class="wkgrid" style="margin-bottom:22px">'+sems+'</div><div class="sec-title" style="margin-bottom:12px">&#128247; Fotos ('+d.photos.length+')</div>'+fotos+'</div>';}

function lbHTML(){if(!S.lb)return'';return'<div class="lb open" onclick="S.lb=null;render()"><button class="lbclose" onclick="S.lb=null;render()">X</button><img src="'+S.lb+'" alt="" onclick="event.stopPropagation()"></div>';}

function irS(){S.mode="select";render();}
function irV(){S.mode="viewer";carregar();}
function irL(){S.mode="login";S.pwErr=false;render();}
function login(){var inp=document.getElementById("pw");var pw=inp?inp.value:"";if(pw===SENHA){S.mode="editor";S.pwErr=false;carregar();}else{S.pwErr=true;render();}}
function setTab(t){S.tab=t;render();}

function addSem(tid){
var n=document.getElementById("wn"+tid);var c=document.getElementById("wc"+tid);
var nome=n?n.value.trim():"";var cars=c?parseInt(c.value):0;
if(!cars||cars<=0)return;
var wname=nome||"Semana "+(S.teams[tid].weeks.length+1);
S.teams[tid].weeks.push({name:wname,cars:cars});
S.wi[tid]={name:"",cars:""};
salvar();render();}

function delSem(tid,idx){S.teams[tid].weeks.splice(idx,1);salvar();render();}

function upload(event,tid){
var files=Array.from(event.target.files);if(!files.length)return;
var week=S.sem||"";
S.uploading=true;S.uploadingTeam=tid;render();
var done=0;var erros=0;
files.forEach(function(file){
uploadToCloudinary(file,function(err,url){
if(err){erros++;}else{S.teams[tid].photos.push({url:url,week:week,data:dataHoje()});}
done++;
if(done===files.length){S.uploading=false;salvar();render();
if(erros>0)toast(erros+" erro(s) no upload","err");
else toast((done-erros)+" foto(s) enviada(s)!","ok");}
});});
event.target.value="";}

function delFoto(tid,idx){S.teams[tid].photos.splice(idx,1);salvar();render();}
function abrirFoto(url){S.lb=url;render();}

function copiar(tipo){
var s=rank(tipo);
var periodo=S.periodo?" ("+S.periodo+")":"";
var txt=tipo==="week"?"RANKING DA SEMANA - "+(S.sem||"---")+periodo+"\n":"RANKING TOTAL - "+(S.sem||"---")+"\n";
txt+="================================\n";
for(var i=0;i<s.length;i++){
var pos=i+1;
txt+=pos+"o "+s[i].name+"\n   "+s[i].total+" carros adesivados\n";}
txt+="================================\n";
txt+=tipo==="week"?"Total na semana: "+s.reduce(function(a,t){return a+t.total;},0)+"\n":"Total geral: "+totalGeral()+" carros\n";
navigator.clipboard.writeText(txt).then(function(){alert("Copiado! Cole no WhatsApp.");}).catch(function(){prompt("Copie:",txt);});}

render();
</script>
</body>
</html>
